<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coelacanth</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="widget-wrapper">

    <div class="pill" id="pill">
      <div class="pill-row1">
        <img src="../assets/icon.png" class="pill-icon" alt="" />
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="6.5" cy="6.5" r="4.5" />
          <line x1="10.1" y1="10.1" x2="14" y2="14" />
        </svg>
        <input
          type="text"
          id="idea-input"
          class="pill-input"
          placeholder="Email Sarah about tomorrow's meeting..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="attach-btn" class="attach-btn" title="Attach file" type="button">
          <svg width="14" height="13" viewBox="0 0 16 14" fill="none">
            <path d="M1.5 3C1.5 2.17 2.17 1.5 3 1.5H6.5L8 3H13C13.83 3 14.5 3.67 14.5 4.5V11C14.5 11.83 13.83 12.5 13 12.5H3C2.17 12.5 1.5 11.83 1.5 11V3Z"
              stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/>
          </svg>
        </button>
        <input type="file" id="file-input" accept=".pdf,.doc,.docx,.png,.jpg,.txt" />
      </div>
    </div>

    <!-- Result card -->
    <div class="result-area hidden" id="result-area">
      <span class="result-icon" id="result-icon"></span>
      <span class="result-text" id="result-text"></span>
    </div>

    <div class="hint">Press Esc to close &middot; Cmd+Shift+C to toggle</div>

  </div>
  <script src="app.js"></script>
</body>
</html>
